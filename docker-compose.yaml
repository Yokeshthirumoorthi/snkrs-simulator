services:
  nginx:
    image: nginx:alpine
    container_name: otel-lb
    ports:
      - "4317:4317"
    volumes:
      - ./config/nginx-grpc.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    deploy:
      replicas: ${COLLECTORS:-2}
      resources:
        limits:
          memory: ${COLLECTOR_MEM:-2G}
          cpus: '${COLLECTOR_CPUS:-2}'
    volumes:
      - ./config/otel-collector-spaces.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      AWS_ACCESS_KEY_ID: ${DO_SPACES_KEY}
      AWS_SECRET_ACCESS_KEY: ${DO_SPACES_SECRET}
      DO_SPACES_REGION: ${DO_SPACES_REGION}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3
