services:
  nginx:
    image: nginx:alpine
    container_name: otel-lb
    ports:
      - "4317:4317"
    volumes:
      - ./config/nginx-grpc.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    deploy:
      replicas: ${COLLECTORS:-2}
      resources:
        limits:
          memory: ${COLLECTOR_MEM:-2G}
          cpus: '${COLLECTOR_CPUS:-2}'
    volumes:
      - ./config/otel-collector-spaces.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: ${S3_PREFIX}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3
