upstream otel_grpc {
    least_conn;
    server otel-collector:4317;
    # Docker Compose DNS resolves to all replica IPs
}

server {
    listen 4317 http2;

    location / {
        grpc_pass grpc://otel_grpc;
        grpc_next_upstream error timeout;
        grpc_connect_timeout 5s;
        grpc_read_timeout 300s;
        grpc_send_timeout 300s;
    }
}
